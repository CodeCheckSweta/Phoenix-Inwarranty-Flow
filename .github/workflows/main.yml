name : postman Collection Workflow

on:
   push:
     branches: [main]
   workflow_dispatch:
   schedule:
     - cron: 30 02 * * * # 8 am IST
     - cron: 00 14 * * * # 7:30 pm IST
     
jobs:
  run-postman-tests:
    runs-on: ubuntu-latest     #ec2-github-runner 

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2
      - name: install Nodejs and npn
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
      - name: Install newman and Html extra globally
        run: |
             npm install -g newman
             npm install -g newman-reporter-htmlextra

      - name: Run the Postman collection with Newman
        run: |
             newman run 'Inwaranty-flow Collection.postman_collection.json' \
             -e QA.postman_environment.json \
             -d testdata.csv \
             -r cli,htmlextra \
             --reporter-htmlextra-export ./newman/index.html
             
      - name: Newman Report
        if: always() # ensure that the archive is executed irrespective of whether the previous step has failed or not!
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html
             
      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN}} 
          publish_dir: newman/
          
      - name: Send email Notifications
        if: always()
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME}}
          password: ${{ secrets.EMAIL_PASSWORD}}
          subject: Phoenix In-Warranty Flow Test Execution Notification
          to: sweta.singh0322@gmail.com
          from: ${{ secrets.EMAIL_USERNAME}}
          body: |
                Hi All,
                Phoenix Inwarranty flow tests have been executed. The Report has been published, and the URL 
                is: https://codechecksweta.github.io/Phoenix-Inwarranty-Flow/
